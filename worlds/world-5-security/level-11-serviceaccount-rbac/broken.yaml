{
  "apiVersion": "v1",
  "kind": "ServiceAccount",
  "metadata": {
    "name": "config-reader-sa",
    "namespace": "k8smissions"
  }
}
---
{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "config-lister",
    "namespace": "k8smissions"
  },
  "spec": {
    "serviceAccountName": "config-reader-sa",
    "containers": [
      {
        "name": "lister",
        "image": "bitnami/kubectl:latest",
        "command": [
          "/bin/sh",
          "-c",
          "kubectl get configmaps -n k8smissions && echo SUCCESS || echo FORBIDDEN"
        ]
      }
    ]
  }
}
