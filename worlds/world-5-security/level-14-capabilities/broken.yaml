{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "port-binder",
    "namespace": "k8smissions"
  },
  "spec": {
    "containers": [
      {
        "name": "binder",
        "image": "busybox:1.36",
        "command": [
          "/bin/sh",
          "-c",
          "nc -l -p 80 || echo 'FAILED to bind port 80'"
        ],
        "securityContext": {
          "runAsNonRoot": true,
          "runAsUser": 1000,
          "capabilities": {
            "drop": [
              "ALL"
            ]
          }
        }
      }
    ]
  }
}
