{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "insecure-pod",
    "namespace": "k8smissions"
  },
  "spec": {
    "securityContext": {
      "runAsNonRoot": true,
      "runAsUser": 1000
    },
    "containers": [
      {
        "name": "app",
        "image": "busybox:1.36",
        "command": [
          "/bin/sh",
          "-c",
          "id; sleep 3600"
        ],
        "securityContext": {
          "allowPrivilegeEscalation": false,
          "readOnlyRootFilesystem": true
        }
      }
    ]
  }
}
