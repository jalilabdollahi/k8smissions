apiVersion: v1
kind: ResourceQuota
metadata:
  name: ns-quota
  namespace: k8smissions
spec:
  hard:
    requests.cpu: 500m
    requests.memory: 512Mi
    limits.cpu: '1'
    limits.memory: 1Gi
    pods: '5'
---
apiVersion: v1
kind: Pod
metadata:
  name: quota-buster
  namespace: k8smissions
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - sleep 3600
    resources:
      requests:
        cpu: 400m      # ❌ BUG: Requests 400m of the 500m CPU quota — leaves almost nothing for other pods.
        memory: 400Mi  # ❌ BUG: Requests 400Mi of the 512Mi memory quota — other pods cannot schedule.
      limits:
        cpu: 800m
        memory: 900Mi
