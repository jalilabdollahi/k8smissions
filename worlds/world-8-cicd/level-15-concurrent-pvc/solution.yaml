apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: ci-pipeline
  namespace: k8smissions
spec:
  workspaces:
  - name: source
  tasks:
  - name: build
    taskRef:
      name: build-task
    workspaces:
    - name: source
      workspace: source
---
# PipelineRun — each run gets its own isolated PVC via volumeClaimTemplate
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: ci-run-001
  namespace: k8smissions
spec:
  pipelineRef:
    name: ci-pipeline
  workspaces:
  - name: source
    volumeClaimTemplate:               # ✅ FIX: volumeClaimTemplate provisions a fresh PVC per PipelineRun — each run is fully isolated
      spec:
        accessModes:
        - ReadWriteOnce                # ✅ FIX: ReadWriteOnce is sufficient when one run uses one node; use ReadWriteMany for parallel Tasks
        resources:
          requests:
            storage: 1Gi
