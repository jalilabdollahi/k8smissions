apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: build-run
  namespace: k8smissions
spec:
  pipelineRef:
    name: build-pipeline
  workspaces:
  - name: source    # ✅ FIX: workspace 'source' is now bound — name matches the Pipeline's declared workspace
    emptyDir: {}    # ✅ FIX: emptyDir provides temporary storage for the run duration; use a PVC for persistent artifacts
