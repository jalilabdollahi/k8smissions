{
  "apiVersion": "v1",
  "kind": "List",
  "items": [
    {
      "apiVersion": "admissionregistration.k8s.io/v1",
      "kind": "ValidatingWebhookConfiguration",
      "metadata": {
        "name": "strict-validator"
      },
      "webhooks": [
        {
          "name": "validate.example.com",
          "admissionReviewVersions": [
            "v1"
          ],
          "clientConfig": {
            "service": {
              "name": "validator-svc",
              "namespace": "operators",
              "port": 443
            }
          },
          "rules": [
            {
              "apiGroups": [
                ""
              ],
              "apiVersions": [
                "v1"
              ],
              "operations": [
                "CREATE"
              ],
              "resources": [
                "pods"
              ]
            }
          ],
          "failurePolicy": "Fail",
          "sideEffects": "None"
        }
      ]
    },
    {
      "apiVersion": "apiextensions.k8s.io/v1",
      "kind": "CustomResourceDefinition",
      "metadata": {
        "name": "apps.example.com"
      },
      "spec": {
        "group": "example.com",
        "versions": [
          {
            "name": "v2",
            "served": true,
            "storage": true
          }
        ],
        "scope": "Namespaced",
        "names": {
          "plural": "apps",
          "singular": "app",
          "kind": "App"
        }
      }
    },
    {
      "apiVersion": "apps/v1",
      "kind": "Deployment",
      "metadata": {
        "name": "my-operator",
        "namespace": "operators"
      },
      "spec": {
        "replicas": 2,
        "selector": {
          "matchLabels": {
            "app": "my-operator"
          }
        },
        "template": {
          "metadata": {
            "labels": {
              "app": "my-operator"
            }
          },
          "spec": {
            "containers": [
              {
                "name": "operator",
                "image": "my-operator:v1.0",
                "args": [
                  "--leader-elect=false"
                ],
                "resources": {
                  "requests": {
                    "cpu": "50m",
                    "memory": "64Mi"
                  },
                  "limits": {
                    "cpu": "200m",
                    "memory": "128Mi"
                  }
                }
              }
            ]
          }
        }
      }
    }
  ]
}
