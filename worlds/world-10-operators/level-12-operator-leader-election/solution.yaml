{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "my-operator",
    "namespace": "operators"
  },
  "spec": {
    "replicas": 2,
    "selector": {
      "matchLabels": {
        "app": "my-operator"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "my-operator"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "operator",
            "image": "my-operator:v1.0",
            "args": [
              "--leader-elect=true",
              "--leader-elect-lease-duration=30s"
            ],
            "resources": {
              "requests": {
                "cpu": "50m",
                "memory": "64Mi"
              },
              "limits": {
                "cpu": "200m",
                "memory": "128Mi"
              }
            }
          }
        ]
      }
    }
  }
}
