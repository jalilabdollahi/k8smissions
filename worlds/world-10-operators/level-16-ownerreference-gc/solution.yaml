apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deploy
  namespace: k8smissions
  labels:
    managed-by: my-operator
  ownerReferences:
  - apiVersion: example.com/v1
    kind: MyApp
    name: my-app
    uid: placeholder-uid-replace-at-runtime
    controller: true
    blockOwnerDeletion: true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: app
        image: nginx:1.25
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
