{
  "apiVersion": "rbac.authorization.k8s.io/v1",
  "kind": "ClusterRole",
  "metadata": {
    "name": "my-operator-role"
  },
  "rules": [
    {
      "apiGroups": [
        "example.com"
      ],
      "resources": [
        "workloads",
        "workloads/status"
      ],
      "verbs": [
        "get",
        "list",
        "watch",
        "create",
        "update",
        "patch",
        "delete"
      ]
    },
    {
      "apiGroups": [
        ""
      ],
      "resources": [
        "pods",
        "services",
        "configmaps"
      ],
      "verbs": [
        "get",
        "list",
        "watch",
        "create",
        "update",
        "patch",
        "delete"
      ]
    },
    {
      "apiGroups": [
        "apps"
      ],
      "resources": [
        "deployments"
      ],
      "verbs": [
        "get",
        "list",
        "watch",
        "create",
        "update",
        "patch",
        "delete"
      ]
    }
  ]
}
