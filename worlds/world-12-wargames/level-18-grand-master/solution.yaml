[
  {
    "apiVersion": "v1",
    "kind": "Pod",
    "metadata": {
      "name": "w1-pod",
      "namespace": "k8smissions"
    },
    "spec": {
      "containers": [
        {
          "name": "w1",
          "image": "nginx:1.27.4"
        }
      ]
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w2-deploy",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 2,
      "selector": {
        "matchLabels": {
          "app": "w2"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w2"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w2",
              "image": "nginx:1.27.4"
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "v1",
    "kind": "Service",
    "metadata": {
      "name": "w3-svc",
      "namespace": "k8smissions"
    },
    "spec": {
      "selector": {
        "app": "w2"
      },
      "ports": [
        {
          "port": 80,
          "targetPort": 80
        }
      ]
    }
  },
  {
    "apiVersion": "v1",
    "kind": "PersistentVolumeClaim",
    "metadata": {
      "name": "w4-pvc",
      "namespace": "k8smissions"
    },
    "spec": {
      "accessModes": [
        "ReadWriteOnce"
      ],
      "resources": {
        "requests": {
          "storage": "1Gi"
        }
      },
      "storageClassName": "standard"
    }
  },
  {
    "apiVersion": "v1",
    "kind": "ServiceAccount",
    "metadata": {
      "name": "w5-sa",
      "namespace": "k8smissions"
    }
  },
  {
    "apiVersion": "rbac.authorization.k8s.io/v1",
    "kind": "RoleBinding",
    "metadata": {
      "name": "w5-rb",
      "namespace": "k8smissions"
    },
    "subjects": [
      {
        "kind": "ServiceAccount",
        "name": "w5-sa",
        "namespace": "k8smissions"
      }
    ],
    "roleRef": {
      "kind": "Role",
      "name": "w5-role",
      "apiGroup": "rbac.authorization.k8s.io"
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w6-monitored",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "w6"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w6"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w6",
              "image": "nginx:1.27.4",
              "ports": [
                {
                  "containerPort": 80
                }
              ],
              "readinessProbe": {
                "httpGet": {
                  "path": "/",
                  "port": 80
                },
                "initialDelaySeconds": 3,
                "periodSeconds": 5
              }
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "v1",
    "kind": "ConfigMap",
    "metadata": {
      "name": "w7-config",
      "namespace": "k8smissions"
    },
    "data": {
      "ENV": "production",
      "REGION": "us-east-1"
    }
  },
  {
    "apiVersion": "v1",
    "kind": "Secret",
    "metadata": {
      "name": "w8-secret",
      "namespace": "k8smissions"
    },
    "type": "Opaque",
    "stringData": {
      "token": "pipeline-token-secure"
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w8-pipeline",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "w8"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w8"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w8",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ],
              "env": [
                {
                  "name": "TOKEN",
                  "valueFrom": {
                    "secretKeyRef": {
                      "name": "w8-secret",
                      "key": "token"
                    }
                  }
                }
              ]
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w9-scheduled",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "w9"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w9"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w9",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ],
              "resources": {
                "limits": {
                  "memory": "256Mi"
                }
              }
            }
          ]
        }
      }
    }
  }
]
