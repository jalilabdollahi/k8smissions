[
  {
    "apiVersion": "v1",
    "kind": "Pod",
    "metadata": {
      "name": "w1-pod",
      "namespace": "k8smissions"
    },
    "spec": {
      "containers": [
        {
          "name": "w1",
          "image": "nginx:doesnotexist99"
        }
      ]
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w2-deploy",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 0,
      "selector": {
        "matchLabels": {
          "app": "w2"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w2"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w2",
              "image": "nginx:1.27.4"
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "v1",
    "kind": "Service",
    "metadata": {
      "name": "w3-svc",
      "namespace": "k8smissions"
    },
    "spec": {
      "selector": {
        "app": "wrong-label"
      },
      "ports": [
        {
          "port": 80,
          "targetPort": 80
        }
      ]
    }
  },
  {
    "apiVersion": "v1",
    "kind": "PersistentVolumeClaim",
    "metadata": {
      "name": "w4-pvc",
      "namespace": "k8smissions"
    },
    "spec": {
      "accessModes": [
        "ReadWriteOnce"
      ],
      "resources": {
        "requests": {
          "storage": "500Ti"
        }
      },
      "storageClassName": "standard"
    }
  },
  {
    "apiVersion": "v1",
    "kind": "ServiceAccount",
    "metadata": {
      "name": "w5-sa",
      "namespace": "k8smissions"
    }
  },
  {
    "apiVersion": "rbac.authorization.k8s.io/v1",
    "kind": "Role",
    "metadata": {
      "name": "w5-role",
      "namespace": "k8smissions"
    },
    "rules": [
      {
        "apiGroups": [
          ""
        ],
        "resources": [
          "pods"
        ],
        "verbs": [
          "get",
          "list"
        ]
      }
    ]
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w6-monitored",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "w6"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w6"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w6",
              "image": "nginx:1.27.4",
              "ports": [
                {
                  "containerPort": 80
                }
              ]
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "v1",
    "kind": "ConfigMap",
    "metadata": {
      "name": "w7-config",
      "namespace": "k8smissions"
    },
    "data": {
      "ENV": "",
      "REGION": ""
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w8-pipeline",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "w8"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w8"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w8",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ],
              "env": [
                {
                  "name": "TOKEN",
                  "valueFrom": {
                    "secretKeyRef": {
                      "name": "w8-secret",
                      "key": "token"
                    }
                  }
                }
              ]
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "w9-scheduled",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "w9"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "w9"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "w9",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ],
              "resources": {
                "limits": {
                  "memory": "1Mi"
                }
              }
            }
          ]
        }
      }
    }
  }
]
