[
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "svc-alpha",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "svc-alpha"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "svc-alpha"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "svc-alpha",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ],
              "resources": {
                "requests": {
                  "memory": "64Mi"
                },
                "limits": {
                  "memory": "256Mi"
                }
              }
            }
          ]
        }
      }
    }
  },
