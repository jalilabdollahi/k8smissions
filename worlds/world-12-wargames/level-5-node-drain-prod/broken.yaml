---
# ❌ BUG: PodDisruptionBudget requires minAvailable:3 but the Deployment only has 2 replicas.
# Math: to evict any pod we need at least 3 available — impossible with only 2 total.
# kubectl drain will permanently block: "Cannot evict pod as it would violate the PDB"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-app
  namespace: k8smissions
spec:
  replicas: 2  # only 2 replicas exist
  selector:
    matchLabels:
      app: critical-app
  template:
    metadata:
      labels:
        app: critical-app
    spec:
      containers:
      - name: critical-app
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: critical-pdb
  namespace: k8smissions
spec:
  minAvailable: 3  # ❌ BUG: minAvailable (3) >= replicas (2) — drain is permanently blocked
  selector:
    matchLabels:
      app: critical-app
