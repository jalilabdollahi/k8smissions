[
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "critical-app",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 2,
      "selector": {
        "matchLabels": {
          "app": "critical-app"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "critical-app"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "critical-app",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ]
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "policy/v1",
    "kind": "PodDisruptionBudget",
    "metadata": {
      "name": "critical-pdb",
      "namespace": "k8smissions"
    },
    "spec": {
      "minAvailable": 3,
      "selector": {
        "matchLabels": {
          "app": "critical-app"
        }
      }
    }
  }
]
