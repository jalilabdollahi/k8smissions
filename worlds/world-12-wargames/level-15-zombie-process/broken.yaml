{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "zombie-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "replicas": 1,
    "selector": {
      "matchLabels": {
        "app": "zombie-app"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "zombie-app"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "zombie-app",
            "image": "hashicorp/http-echo:1.0.0",
            "args": [
              "-text=ok",
              "-listen=:8080"
            ],
            "ports": [
              {
                "containerPort": 8080
              }
            ]
          }
        ]
      }
    }
  }
}
