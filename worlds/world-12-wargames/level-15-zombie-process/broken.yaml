# ❌ BUG: No readiness or liveness probes configured.
# The app process can become a zombie (Z state) — container stays Running because
# PID 1 is technically alive, but the app serves no requests.
# Without probes, Kubernetes cannot detect the unhealthy state:
#   - Pod stays Running (never marked NotReady)
#   - Pod stays in Service endpoints (traffic routes to dead process)
#   - Pod is never restarted (no liveness to trigger restart)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zombie-app
  namespace: k8smissions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zombie-app
  template:
    metadata:
      labels:
        app: zombie-app
    spec:
      containers:
      - name: zombie-app
        image: hashicorp/http-echo:1.0.0
        args:
        - -text=ok
        - -listen=:8080
        ports:
        - containerPort: 8080
        # ❌ BUG: readinessProbe is absent — zombie pod stays in Service endpoints
        # ❌ BUG: livenessProbe is absent — zombie pod is never restarted by Kubernetes
