# ❌ BUG: A CI/CD pipeline retry bug created 20 duplicate ci-test-pod-* pods.
# In production this scales to hundreds. Each pod counts against the namespace
# ResourceQuota (pods: 100). When quota is exhausted, legitimate Deployments
# cannot create new pods — they show "forbidden: exceeded quota" in events.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ns-quota
  namespace: k8smissions
spec:
  hard:
    pods: "100"
    requests.cpu: "10"
    requests.memory: 20Gi
---
# ❌ BUG: ci-test-pod-001 through ci-test-pod-020 — stale completed test pods
# that were never cleaned up. They waste quota slots and etcd storage.
# Fix: kubectl delete pod -l job=ci-test -n k8smissions
apiVersion: v1
kind: Pod
metadata:
  name: ci-test-pod-001  # ❌ BUG: Stale CI pod — run completed, should have been deleted
  namespace: k8smissions
  labels:
    job: ci-test
    run: "1"
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox:1.36
    command: ["/bin/sh", "-c", "exit 0"]
---
