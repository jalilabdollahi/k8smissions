# ❌ BUG: A default-deny NetworkPolicy was applied to the entire namespace with no allow rules.
# This blocks ALL ingress and egress for every pod, including DNS (UDP/TCP 53).
# The frontend cannot reach the backend — and neither can reach CoreDNS for name resolution.
# This is good security posture but catastrophic without corresponding allow rules.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all   # ❌ BUG: Applied with no allow rules — blocks all traffic including DNS
  namespace: k8smissions
spec:
  podSelector: {}  # ❌ BUG: Empty selector matches ALL pods in the namespace
  policyTypes:
  - Ingress
  - Egress         # ❌ BUG: Blocking Egress also kills DNS lookups (port 53 UDP/TCP)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8smissions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k8smissions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
