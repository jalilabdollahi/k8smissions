[
  {
    "apiVersion": "networking.k8s.io/v1",
    "kind": "NetworkPolicy",
    "metadata": {
      "name": "deny-all",
      "namespace": "k8smissions"
    },
    "spec": {
      "podSelector": {},
      "policyTypes": [
        "Ingress",
        "Egress"
      ]
    }
  },
  {
    "apiVersion": "networking.k8s.io/v1",
    "kind": "NetworkPolicy",
    "metadata": {
      "name": "allow-frontend-to-backend",
      "namespace": "k8smissions"
    },
    "spec": {
      "podSelector": {
        "matchLabels": {
          "app": "backend"
        }
      },
      "policyTypes": [
        "Ingress"
      ],
      "ingress": [
        {
          "from": [
            {
              "podSelector": {
                "matchLabels": {
                  "app": "frontend"
                }
              }
            }
          ]
        }
      ]
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "frontend",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "frontend"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "frontend"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "frontend",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ]
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "backend",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 1,
      "selector": {
        "matchLabels": {
          "app": "backend"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "backend"
          }
        },
        "spec": {
          "containers": [
            {
              "name": "backend",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ]
            }
          ]
        }
      }
    }
  }
]
