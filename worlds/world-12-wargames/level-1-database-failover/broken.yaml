# ❌ BUG: The db-primary Pod and db-service Service have been deleted from the cluster.
# Only the app-server Deployment remains. Its readinessProbe checks nc -z db-service 5432
# which fails immediately because there are no endpoints — all 3 pods become NotReady.
# The container loops forever trying to connect, never reaching sleep 3600.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-server
  namespace: k8smissions
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-server
  template:
    metadata:
      labels:
        app: app-server
    spec:
      containers:
      - name: app-server
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - until nc -z db-service 5432; do echo waiting; sleep 2; done; sleep 3600
        readinessProbe:
          exec:
            command:
            - nc
            - -z
            - db-service  # ❌ BUG: db-service has no endpoints — db-primary pod is gone
            - '5432'
          initialDelaySeconds: 3
          periodSeconds: 5
