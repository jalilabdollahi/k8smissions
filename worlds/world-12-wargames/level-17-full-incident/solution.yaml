[
  {
    "apiVersion": "v1",
    "kind": "Secret",
    "metadata": {
      "name": "p0-secret",
      "namespace": "k8smissions"
    },
    "type": "Opaque",
    "stringData": {
      "password": "productionpassword"
    }
  },
  {
    "apiVersion": "v1",
    "kind": "ServiceAccount",
    "metadata": {
      "name": "p0-sa",
      "namespace": "k8smissions"
    }
  },
  {
    "apiVersion": "apps/v1",
    "kind": "Deployment",
    "metadata": {
      "name": "p0-app",
      "namespace": "k8smissions"
    },
    "spec": {
      "replicas": 2,
      "selector": {
        "matchLabels": {
          "app": "p0-app"
        }
      },
      "template": {
        "metadata": {
          "labels": {
            "app": "p0-app"
          }
        },
        "spec": {
          "serviceAccountName": "p0-sa",
          "containers": [
            {
              "name": "p0-app",
              "image": "busybox:1.36",
              "command": [
                "/bin/sh",
                "-c",
                "sleep 3600"
              ],
              "env": [
                {
                  "name": "DB_PASS",
                  "valueFrom": {
                    "secretKeyRef": {
                      "name": "p0-secret",
                      "key": "password"
                    }
                  }
                }
              ]
            }
          ]
        }
      }
    }
  },
  {
    "apiVersion": "networking.k8s.io/v1",
    "kind": "NetworkPolicy",
    "metadata": {
      "name": "allow-dns",
      "namespace": "k8smissions"
    },
    "spec": {
      "podSelector": {},
      "policyTypes": [
        "Egress"
      ],
      "egress": [
        {
          "ports": [
            {
              "port": 53,
              "protocol": "UDP"
            },
            {
              "port": 53,
              "protocol": "TCP"
            },
            {
              "port": 80,
              "protocol": "TCP"
            },
            {
              "port": 443,
              "protocol": "TCP"
            }
          ]
        }
      ]
    }
  },
  {
    "apiVersion": "v1",
    "kind": "PersistentVolumeClaim",
    "metadata": {
      "name": "p0-pvc",
      "namespace": "k8smissions"
    },
    "spec": {
      "accessModes": [
        "ReadWriteOnce"
      ],
      "resources": {
        "requests": {
          "storage": "1Gi"
        }
      },
      "storageClassName": "standard"
    }
  }
]
