# ❌ BUG: Deployment scaled to 50 replicas — each pod holds a persistent watch connection
# to the Kubernetes API server. 50 concurrent watchers overwhelm the API server,
# causing cluster-wide latency spikes for all kubectl commands and controllers.
# Symptoms: kubectl commands hang, controllers slow to reconcile, pod scheduling delays.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-watcher
  namespace: k8smissions
spec:
  replicas: 50  # ❌ BUG: 50 replicas × 1 persistent watch each = API server connection flood
  selector:
    matchLabels:
      app: api-watcher
  template:
    metadata:
      labels:
        app: api-watcher
    spec:
      containers:
      - name: api-watcher
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - while true; do sleep 1; done
