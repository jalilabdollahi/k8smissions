---
# ✅ FIX: Delete all stale ci-run-* ConfigMaps to free etcd storage.
#
# This is an imperative fix — no YAML to apply. Run this command:
#
#   kubectl delete configmap -n k8smissions \
#     $(kubectl get cm -n k8smissions --no-headers | awk '/^ci-run-/{print $1}')
#
# Alternatively with label selectors (if objects were labelled at creation):
#   kubectl delete configmap -l pipeline=ci -n k8smissions
#
# ✅ FIX: After deleting all ci-run-* ConfigMaps, validate.sh will pass.
# validate.sh checks: grep -c '^ci-run-' == 0
#
# ✅ FIX: Prevention — add this to all CI Job specs to auto-clean after 5 minutes:
#   spec:
#     ttlSecondsAfterFinished: 300
apiVersion: v1
kind: ConfigMap
metadata:
  name: etcd-cleanup-record  # ✅ FIX: Documents the cleanup state — all ci-run-* objects removed
  namespace: k8smissions
data:
  cleanup_performed: "true"
  ci_run_configmaps_deleted: "20"
  prevention: "ttlSecondsAfterFinished: 300 on all CI Job specs"
