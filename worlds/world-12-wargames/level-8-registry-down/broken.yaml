{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "registry-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "replicas": 2,
    "selector": {
      "matchLabels": {
        "app": "registry-app"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "registry-app"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "registry-app",
            "image": "internal-registry.company.local/app:v2.1",
            "imagePullPolicy": "Always"
          }
        ]
      }
    }
  }
}
