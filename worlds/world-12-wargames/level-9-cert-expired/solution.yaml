# ✅ FIX: Update the cluster-cert-status Secret to reflect renewed certificates.
# In a real cluster, first run: kubeadm certs renew all
# Then update this Secret to reflect the renewed state so monitoring systems
# and the game validator see the correct certificate health status.
#
# Real renewal commands:
#   kubeadm certs check-expiration
#   kubeadm certs renew all
#   kubectl -n kube-system rollout restart deployment/coredns
apiVersion: v1
kind: Secret
metadata:
  name: cluster-cert-status
  namespace: k8smissions
  annotations:
    cert-status: valid     # ✅ FIX: Certificate renewed — status updated to valid
    expiry: '2027-01-01'   # ✅ FIX: New expiry date is in the future (3 years out)
type: Opaque
stringData:
  status: valid
