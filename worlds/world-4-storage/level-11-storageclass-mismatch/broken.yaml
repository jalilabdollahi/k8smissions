{
  "apiVersion": "v1",
  "kind": "PersistentVolumeClaim",
  "metadata": {
    "name": "data-pvc",
    "namespace": "k8smissions"
  },
  "spec": {
    "accessModes": [
      "ReadWriteOnce"
    ],
    "storageClassName": "fast-nvme",
    "resources": {
      "requests": {
        "storage": "1Gi"
      }
    }
  }
}
