{
  "apiVersion": "v1",
  "kind": "PersistentVolumeClaim",
  "metadata": {
    "name": "shared-pvc",
    "namespace": "k8smissions"
  },
  "spec": {
    "accessModes": [
      "ReadWriteOnce"
    ],
    "storageClassName": "standard",
    "resources": {
      "requests": {
        "storage": "2Gi"
      }
    }
  }
}
