apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-job
  namespace: k8smissions
spec:
  replicas: 3
  selector:
    matchLabels:
      app: batch
  template:
    metadata:
      labels:
        app: batch
    spec:
      tolerations:
      - key: spot
        operator: Equal
        value: 'true'
        effect: NoSchedule
      # ✅ FIX: Added toleration for on-demand node taint so pods can reschedule
      # to on-demand nodes when spot instances are reclaimed.
      - key: on-demand
        operator: Equal
        value: 'true'
        effect: NoSchedule
      # ✅ FIX: Removed nodeSelector that was pinning pods to spot nodes only,
      # allowing fallback scheduling to on-demand nodes.
      containers:
      - name: batch
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
