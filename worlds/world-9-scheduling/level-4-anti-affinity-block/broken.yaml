{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "distributed-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "replicas": 3,
    "selector": {
      "matchLabels": {
        "app": "distributed"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "distributed"
        }
      },
      "spec": {
        "affinity": {
          "podAntiAffinity": {
            "requiredDuringSchedulingIgnoredDuringExecution": [
              {
                "labelSelector": {
                  "matchLabels": {
                    "app": "distributed"
                  }
                },
                "topologyKey": "kubernetes.io/hostname"
              }
            ]
          }
        },
        "containers": [
          {
            "name": "app",
            "image": "nginx:1.25",
            "resources": {
              "requests": {
                "cpu": "50m",
                "memory": "32Mi"
              },
              "limits": {
                "cpu": "100m",
                "memory": "64Mi"
              }
            }
          }
        ]
      }
    }
  }
}
