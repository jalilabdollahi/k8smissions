apiVersion: v1
kind: Pod
metadata:
  name: init-pod
  namespace: k8smissions
spec:
  initContainers:
  - name: db-wait
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    # ✅ FIX: Command now exits 0 immediately — replace with the actual
    # DB hostname once the database service is available.
    - echo 'DB check skipped - DBaaS mode'; exit 0
  containers:
  - name: app
    image: nginx:1.25
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
