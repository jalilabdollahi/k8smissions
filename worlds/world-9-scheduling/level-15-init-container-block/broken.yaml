{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "init-pod",
    "namespace": "k8smissions"
  },
  "spec": {
    "initContainers": [
      {
        "name": "db-wait",
        "image": "busybox:1.36",
        "command": [
          "/bin/sh",
          "-c",
          "until nc -z non-existent-db-host 5432; do sleep 5; done"
        ]
      }
    ],
    "containers": [
      {
        "name": "app",
        "image": "nginx:1.25",
        "resources": {
          "requests": {
            "cpu": "50m",
            "memory": "32Mi"
          },
          "limits": {
            "cpu": "100m",
            "memory": "64Mi"
          }
        }
      }
    ]
  }
}
