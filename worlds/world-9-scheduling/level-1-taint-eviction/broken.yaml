{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "critical-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "containers": [
      {
        "name": "app",
        "image": "nginx:1.25",
        "resources": {
          "requests": {
            "cpu": "50m",
            "memory": "32Mi"
          },
          "limits": {
            "cpu": "100m",
            "memory": "64Mi"
          }
        }
      }
    ]
  }
}
