apiVersion: v1
kind: Pod
metadata:
  name: critical-app
  namespace: k8smissions
spec:
  tolerations:
  # ✅ FIX: Added NoExecute toleration with tolerationSeconds: 300 to give
  # the pod a 5-minute graceful drain window before eviction.
  - key: maintenance
    operator: Equal
    value: draining
    effect: NoExecute
    tolerationSeconds: 300
  containers:
  - name: app
    image: nginx:1.25
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
