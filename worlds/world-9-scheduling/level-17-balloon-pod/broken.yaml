apiVersion: v1
kind: Pod
metadata:
  name: balloon-pod
  namespace: k8smissions
  annotations:
    purpose: capacity-reservation
    cluster-autoscaler.kubernetes.io/safe-to-evict: 'true'
spec:
  priorityClassName: balloon-priority
  containers:
  - name: pause
    image: registry.k8s.io/pause:3.9
    resources:
      requests:
        # ❌ BUG: Oversized requests of 2000m CPU and 4Gi memory on a no-op pause
        # container. This balloon pod silently consumes node scheduling capacity,
        # blocking real workloads from scheduling without any visible CPU/memory usage.
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 2100m
        memory: 4.1Gi
