apiVersion: v1
kind: List
items:
- apiVersion: v1
  kind: Pod
  metadata:
    name: team-a-pod
    namespace: k8smissions
  spec:
    # ✅ FIX (team-a): Removed nodeSelector — no node has label 'team: team-a'.
    # Pod can now schedule on any available node.
    containers:
    - name: app
      image: nginx:1.25
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: team-b-deploy
    namespace: k8smissions
  spec:
    replicas: 5
    selector:
      matchLabels:
        app: team-b
    template:
      metadata:
        labels:
          app: team-b
      spec:
        affinity:
          podAntiAffinity:
            # ✅ FIX (team-b): Changed to preferredDuringScheduling — soft anti-affinity
            # allows all 5 replicas to schedule even with fewer than 5 nodes available.
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: team-b
                topologyKey: kubernetes.io/hostname
        containers:
        - name: app
          image: nginx:1.25
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
- apiVersion: v1
  kind: Pod
  metadata:
    name: team-c-pod
    namespace: k8smissions
  spec:
    # ✅ FIX (team-c): Removed the non-existent priorityClassName — pod can now
    # be admitted by the API server and enter the scheduling queue normally.
    containers:
    - name: app
      image: nginx:1.25
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
