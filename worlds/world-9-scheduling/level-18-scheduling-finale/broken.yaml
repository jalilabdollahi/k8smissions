{
  "apiVersion": "v1",
  "kind": "List",
  "items": [
    {
      "apiVersion": "v1",
      "kind": "Pod",
      "metadata": {
        "name": "team-a-pod",
        "namespace": "k8smissions"
      },
      "spec": {
        "nodeSelector": {
          "team": "team-a"
        },
        "containers": [
          {
            "name": "app",
            "image": "nginx:1.25",
            "resources": {
              "requests": {
                "cpu": "50m",
                "memory": "32Mi"
              },
              "limits": {
                "cpu": "100m",
                "memory": "64Mi"
              }
            }
          }
        ]
      }
    },
    {
      "apiVersion": "apps/v1",
      "kind": "Deployment",
      "metadata": {
        "name": "team-b-deploy",
        "namespace": "k8smissions"
      },
      "spec": {
        "replicas": 5,
        "selector": {
          "matchLabels": {
            "app": "team-b"
          }
        },
        "template": {
          "metadata": {
            "labels": {
              "app": "team-b"
            }
          },
          "spec": {
            "affinity": {
              "podAntiAffinity": {
                "requiredDuringSchedulingIgnoredDuringExecution": [
                  {
                    "labelSelector": {
                      "matchLabels": {
                        "app": "team-b"
                      }
                    },
                    "topologyKey": "kubernetes.io/hostname"
                  }
                ]
              }
            },
            "containers": [
              {
                "name": "app",
                "image": "nginx:1.25",
                "resources": {
                  "requests": {
                    "cpu": "50m",
                    "memory": "32Mi"
                  },
                  "limits": {
                    "cpu": "100m",
                    "memory": "64Mi"
                  }
                }
              }
            ]
          }
        }
      }
    },
    {
      "apiVersion": "v1",
      "kind": "Pod",
      "metadata": {
        "name": "team-c-pod",
        "namespace": "k8smissions"
      },
      "spec": {
        "priorityClassName": "non-existent-priority",
        "containers": [
          {
            "name": "app",
            "image": "nginx:1.25",
            "resources": {
              "requests": {
                "cpu": "50m",
                "memory": "32Mi"
              },
              "limits": {
                "cpu": "100m",
                "memory": "64Mi"
              }
            }
          }
        ]
      }
    }
  ]
}
