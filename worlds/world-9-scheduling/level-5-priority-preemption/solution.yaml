{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "critical-workload",
    "namespace": "k8smissions"
  },
  "spec": {
    "priorityClassName": "high-priority",
    "containers": [
      {
        "name": "app",
        "image": "nginx:1.25",
        "resources": {
          "requests": {
            "cpu": "500m",
            "memory": "256Mi"
          },
          "limits": {
            "cpu": "1",
            "memory": "512Mi"
          }
        }
      }
    ]
  }
}
