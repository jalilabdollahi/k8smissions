apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod
  namespace: k8smissions
spec:
  # ❌ BUG: nodeSelector references label 'accelerator-type: nvidia-v100' which
  # does not exist on any node. No node matches → pod stuck Pending forever.
  nodeSelector:
    accelerator-type: nvidia-v100
  containers:
  - name: trainer
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - echo training; sleep 3600
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
