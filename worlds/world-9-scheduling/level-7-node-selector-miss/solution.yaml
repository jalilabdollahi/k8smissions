apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod
  namespace: k8smissions
spec:
  # ✅ FIX: Removed the invalid nodeSelector — no node has the label
  # 'accelerator-type: nvidia-v100', so the pod can now schedule on any node.
  # Label a real GPU node with this key-value pair once GPU nodes are available.
  containers:
  - name: trainer
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - echo training; sleep 3600
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
