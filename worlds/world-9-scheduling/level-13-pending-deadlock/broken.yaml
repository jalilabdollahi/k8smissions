apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: strict-validator
webhooks:
- name: validate.example.com
  admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: validator-svc
      namespace: kube-system
      port: 443
  rules:
  - apiGroups:
    - ''
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  # ❌ BUG: failurePolicy: Fail means if the webhook service is unreachable,
  # ALL pod creation is blocked cluster-wide. The validator-svc is down,
  # causing every pod CREATE to timeout and fail — a full scheduling deadlock.
  failurePolicy: Fail
  sideEffects: None
