apiVersion: policy/v1alpha1
kind: DeschedulerPolicy
strategies:
  LowNodeUtilization:
    # ✅ FIX: Changed enabled: false to enabled: true — the descheduler will now
    # evict pods from over-utilized nodes so the scheduler can rebalance them
    # onto under-utilized nodes.
    enabled: true
    params:
      nodeResourceUtilizationThresholds:
        thresholds:
          cpu: 20
          memory: 20
          pods: 20
        targetThresholds:
          cpu: 50
          memory: 50
          pods: 50
