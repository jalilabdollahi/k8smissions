{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "memory-hog",
    "namespace": "k8smissions",
    "labels": {
      "app": "memory-hog"
    }
  },
  "spec": {
    "replicas": 4,
    "selector": {
      "matchLabels": {
        "app": "memory-hog"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "memory-hog"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "memory-hog",
            "image": "busybox:1.36",
            "command": [
              "/bin/sh",
              "-c",
              "dd if=/dev/zero of=/dev/null bs=1M count=512 && sleep 3600"
            ],
            "resources": {
              "requests": {
                "memory": "64Mi"
              }
            }
          }
        ]
      }
    }
  }
}
