{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "fragile-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "containers": [
      {
        "name": "app",
        "image": "busybox:1.36",
        "command": [
          "/bin/sh",
          "-c",
          "sleep 3600"
        ],
        "livenessProbe": {
          "exec": {
            "command": [
              "ls",
              "/"
            ]
          },
          "initialDelaySeconds": 5,
          "periodSeconds": 5,
          "failureThreshold": 1
        }
      }
    ]
  }
}
