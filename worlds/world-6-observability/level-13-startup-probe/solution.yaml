{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "slow-java-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "containers": [
      {
        "name": "app",
        "image": "busybox:1.36",
        "command": [
          "/bin/sh",
          "-c",
          "sleep 120 && touch /tmp/ready && sleep 3600"
        ],
        "startupProbe": {
          "exec": {
            "command": [
              "test",
              "-f",
              "/tmp/ready"
            ]
          },
          "failureThreshold": 30,
          "periodSeconds": 5
        },
        "livenessProbe": {
          "exec": {
            "command": [
              "test",
              "-f",
              "/tmp/ready"
            ]
          },
          "initialDelaySeconds": 0,
          "periodSeconds": 10,
          "failureThreshold": 3
        }
      }
    ]
  }
}
