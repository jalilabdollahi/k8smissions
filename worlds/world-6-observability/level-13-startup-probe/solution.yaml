apiVersion: v1
kind: Pod
metadata:
  name: slow-java-app
  namespace: k8smissions
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - sleep 120 && touch /tmp/ready && sleep 3600
    startupProbe:             # ✅ FIX: startupProbe added — it runs first and disables the liveness probe
      exec:                   #         until it succeeds. This gives the app a protected startup window.
        command:
        - test
        - -f
        - /tmp/ready
      failureThreshold: 30   # ✅ FIX: 30 × 5s = 150s maximum startup window — enough for the 120s boot.
      periodSeconds: 5
    livenessProbe:
      exec:
        command:
        - test
        - -f
        - /tmp/ready
      initialDelaySeconds: 0  # ✅ FIX: No extra delay needed — startupProbe already guarantees the app is up.
      periodSeconds: 10
      failureThreshold: 3
