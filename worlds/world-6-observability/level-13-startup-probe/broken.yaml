apiVersion: v1
kind: Pod
metadata:
  name: slow-java-app
  namespace: k8smissions
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - sleep 120 && touch /tmp/ready && sleep 3600
    livenessProbe:
      exec:
        command:
        - test
        - -f
        - /tmp/ready
      initialDelaySeconds: 10   # ❌ BUG: Only 10s initial delay before liveness probing begins.
      periodSeconds: 10
      failureThreshold: 3       # ❌ BUG: With delay=10 + 3×10=30s, the liveness probe kills the
                                #         container after 40s total — but the app needs 120s to boot.
                                #         No startupProbe exists to protect the slow startup window.
