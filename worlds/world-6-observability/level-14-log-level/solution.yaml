apiVersion: v1
kind: Pod
metadata:
  name: logger-app
  namespace: k8smissions
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - while true; do echo "[$LOG_LEVEL] log line"; sleep 1; done
    env:
    - name: LOG_LEVEL
      value: INFO  # ✅ FIX: Changed from DEBUG to INFO — reduces log volume to meaningful operational events.
                   # INFO level logs errors, warnings, and key application events without debug noise.
