{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "probe-app",
    "namespace": "k8smissions",
    "labels": {
      "app": "probe-app"
    }
  },
  "spec": {
    "replicas": 1,
    "selector": {
      "matchLabels": {
        "app": "probe-app"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "probe-app"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "probe-app",
            "image": "hashicorp/http-echo:1.0.0",
            "args": [
              "-text=ok",
              "-listen=:8080"
            ],
            "ports": [
              {
                "containerPort": 8080
              }
            ],
            "readinessProbe": {
              "httpGet": {
                "path": "/api/v1/ready",
                "port": 8080
              },
              "initialDelaySeconds": 10,
              "periodSeconds": 5
            },
            "livenessProbe": {
              "httpGet": {
                "path": "/healthz",
                "port": 8080
              },
              "initialDelaySeconds": 5,
              "periodSeconds": 5
            }
          }
        ]
      }
    }
  }
}
