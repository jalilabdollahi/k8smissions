apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-app
  namespace: k8smissions
  labels:
    app: slow-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-app
  template:
    metadata:
      labels:
        app: slow-app
    spec:
      containers:
      - name: slow-app
        image: hashicorp/http-echo:1.0.0
        args:
        - -text=ready
        - -listen=:8080
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
