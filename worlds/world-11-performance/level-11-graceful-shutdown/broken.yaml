{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "web-server",
    "namespace": "k8smissions"
  },
  "spec": {
    "replicas": 3,
    "selector": {
      "matchLabels": {
        "app": "web"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "web"
        }
      },
      "spec": {
        "terminationGracePeriodSeconds": 5,
        "containers": [
          {
            "name": "web",
            "image": "nginx:1.25",
            "ports": [
              {
                "containerPort": 80
              }
            ],
            "resources": {
              "requests": {
                "cpu": "50m",
                "memory": "32Mi"
              },
              "limits": {
                "cpu": "200m",
                "memory": "64Mi"
              }
            }
          }
        ]
      }
    }
  }
}
