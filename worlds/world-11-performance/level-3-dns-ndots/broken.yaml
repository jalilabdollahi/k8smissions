{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "dns-heavy-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "containers": [
      {
        "name": "app",
        "image": "busybox:1.36",
        "command": [
          "/bin/sh",
          "-c",
          "while true; do nslookup db; nslookup cache; nslookup api; sleep 0.1; done"
        ],
        "resources": {
          "requests": {
            "cpu": "50m",
            "memory": "32Mi"
          },
          "limits": {
            "cpu": "100m",
            "memory": "64Mi"
          }
        }
      }
    ]
  }
}
