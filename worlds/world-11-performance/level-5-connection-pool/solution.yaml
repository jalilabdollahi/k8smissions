{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "web-app",
    "namespace": "k8smissions"
  },
  "spec": {
    "replicas": 10,
    "selector": {
      "matchLabels": {
        "app": "web-app"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "web-app"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "web",
            "image": "my-web-app:v1",
            "env": [
              {
                "name": "DB_URL",
                "value": "postgres://db.k8smissions.svc.cluster.local:5432/mydb"
              },
              {
                "name": "DB_MAX_CONNECTIONS",
                "value": "100"
              },
              {
                "name": "DB_POOL_SIZE",
                "value": "5"
              },
              {
                "name": "DB_POOL_TIMEOUT",
                "value": "30"
              },
              {
                "name": "DB_POOL_MAX_OVERFLOW",
                "value": "10"
              }
            ],
            "resources": {
              "requests": {
                "cpu": "100m",
                "memory": "128Mi"
              },
              "limits": {
                "cpu": "500m",
                "memory": "256Mi"
              }
            }
          }
        ]
      }
    }
  }
}
