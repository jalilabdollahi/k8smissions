{
  "apiVersion": "v1",
  "kind": "Service",
  "metadata": {
    "name": "nodeport-svc",
    "namespace": "k8smissions"
  },
  "spec": {
    "type": "NodePort",
    "externalTrafficPolicy": "Cluster",
    "selector": {
      "app": "backend"
    },
    "ports": [
      {
        "port": 80,
        "targetPort": 80,
        "nodePort": 30080
      }
    ]
  }
}
