{
  "apiVersion": "v1",
  "kind": "Service",
  "metadata": {
    "name": "dual-svc",
    "namespace": "k8smissions"
  },
  "spec": {
    "selector": {
      "app": "dual"
    },
    "ports": [
      {
        "port": 80,
        "targetPort": 80
      },
      {
        "port": 443,
        "targetPort": 443
      }
    ]
  }
}
---
{
  "apiVersion": "networking.k8s.io/v1",
  "kind": "Ingress",
  "metadata": {
    "name": "dual-ingress",
    "namespace": "k8smissions"
  },
  "spec": {
    "rules": [
      {
        "host": "dual.example.com",
        "http": {
          "paths": [
            {
              "path": "/",
              "pathType": "Prefix",
              "backend": {
                "service": {
                  "name": "dual-svc",
                  "port": {
                    "name": "http"
                  }
                }
              }
            }
          ]
        }
      }
    ]
  }
}
