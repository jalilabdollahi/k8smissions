{
  "apiVersion": "v1",
  "kind": "Service",
  "metadata": {
    "name": "dual-svc",
    "namespace": "k8smissions"
  },
  "spec": {
    "selector": {
      "app": "dual"
    },
    "ports": [
      {
        "name": "http",
        "port": 80,
        "targetPort": 80
      },
      {
        "name": "https",
        "port": 443,
        "targetPort": 443
      }
    ]
  }
}
