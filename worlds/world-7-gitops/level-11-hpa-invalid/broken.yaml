apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: k8smissions
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 10  # ❌ BUG: minReplicas (10) is greater than maxReplicas (3) — invalid configuration
  maxReplicas: 3   # ❌ BUG: maxReplicas must be >= minReplicas; HPA enters error state and cannot reconcile
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
