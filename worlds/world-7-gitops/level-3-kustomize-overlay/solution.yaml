apiVersion: apps/v1
kind: Deployment
metadata:
  name: kustomize-app
  namespace: k8smissions
  labels:
    app: kustomize-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kustomize-app
  template:
    metadata:
      labels:
        app: kustomize-app
    spec:
      containers:
      - name: kustomize-app
        image: nginx:1.27.4
