{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "cluster-autoscaler",
    "namespace": "k8smissions",
    "labels": {
      "app": "cluster-autoscaler"
    }
  },
  "spec": {
    "replicas": 1,
    "selector": {
      "matchLabels": {
        "app": "cluster-autoscaler"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "cluster-autoscaler"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "cluster-autoscaler",
            "image": "registry.k8s.io/autoscaling/cluster-autoscaler:v1.30.0",
            "args": [
              "--node-group-auto-discovery=asg:tag=kind-worker"
            ]
          }
        ]
      }
    }
  }
}
