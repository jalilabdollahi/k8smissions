{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "graceful-app",
    "namespace": "k8smissions",
    "labels": {
      "app": "graceful-app"
    }
  },
  "spec": {
    "replicas": 1,
    "selector": {
      "matchLabels": {
        "app": "graceful-app"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "graceful-app"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "graceful-app",
            "image": "nginx:1.27.4"
          }
        ]
      }
    }
  }
}
