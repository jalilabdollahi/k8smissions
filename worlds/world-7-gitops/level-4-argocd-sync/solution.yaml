{
  "apiVersion": "v1",
  "kind": "Namespace",
  "metadata": {
    "name": "webapp-prod"
  }
}
---
{
  "apiVersion": "v1",
  "kind": "ConfigMap",
  "metadata": {
    "name": "argocd-application",
    "namespace": "k8smissions"
  },
  "data": {
    "status": "Synced",
    "targetNamespace": "webapp-prod"
  }
}
---
{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "name": "webapp-app",
    "namespace": "webapp-prod"
  },
  "spec": {
    "replicas": 1,
    "selector": {
      "matchLabels": {
        "app": "webapp-app"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "webapp-app"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "webapp-app",
            "image": "nginx:1.27.4"
          }
        ]
      }
    }
  }
}
