{
  "apiVersion": "batch/v1",
  "kind": "Job",
  "metadata": {
    "name": "db-init",
    "namespace": "k8smissions"
  },
  "spec": {
    "backoffLimit": 2,
    "template": {
      "spec": {
        "restartPolicy": "Never",
        "containers": [
          {
            "name": "db-init",
            "image": "busybox:1.36",
            "command": [
              "/bin/sh",
              "-c",
              "/scripts/init-db.sh"
            ]
          }
        ]
      }
    }
  }
}
