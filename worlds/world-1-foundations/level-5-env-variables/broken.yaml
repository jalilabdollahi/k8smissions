{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "env-pod",
    "namespace": "k8smissions",
    "labels": {
      "app": "env-pod"
    }
  },
  "spec": {
    "containers": [
      {
        "name": "env-pod",
        "image": "busybox:1.36",
        "command": [
          "/bin/sh",
          "-c",
          "if [ -z \"$DATABASE_URL\" ]; then echo \"DATABASE_URL not set, exiting\"; exit 1; fi; sleep 3600"
        ]
      }
    ]
  }
}
