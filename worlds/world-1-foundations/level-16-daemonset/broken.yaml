{
  "apiVersion": "apps/v1",
  "kind": "DaemonSet",
  "metadata": {
    "name": "log-collector",
    "namespace": "k8smissions"
  },
  "spec": {
    "selector": {
      "matchLabels": {
        "app": "log-collector"
      }
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "log-collector"
        }
      },
      "spec": {
        "containers": [
          {
            "name": "log-collector",
            "image": "busybox:1.36",
            "command": [
              "/bin/sh",
              "-c",
              "while true; do echo collecting; sleep 10; done"
            ]
          }
        ]
      }
    }
  }
}
