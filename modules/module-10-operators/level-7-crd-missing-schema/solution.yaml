apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workloads.example.com
spec:
  group: example.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - replicas
            - image
            properties:
              replicas:
                type: integer
                minimum: 1
                maximum: 100
              image:
                type: string
              env:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - value
                  properties:
                    name:
                      type: string
                    value:
                      type: string
  scope: Namespaced
  names:
    plural: workloads
    singular: workload
    kind: Workload
