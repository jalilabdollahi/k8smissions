apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-reader-sa
  namespace: k8smissions
---
apiVersion: v1
kind: Pod
metadata:
  name: config-lister
  namespace: k8smissions
spec:
  serviceAccountName: config-reader-sa
  containers:
  - name: lister
    image: bitnami/kubectl:latest
    command:
    - /bin/sh
    - -c
    - kubectl get configmaps -n k8smissions && echo SUCCESS || echo FORBIDDEN
# ❌ BUG: No Role or RoleBinding exists for this ServiceAccount.
# By default, a ServiceAccount has zero permissions.
# The pod will receive HTTP 403 Forbidden when calling the Kubernetes API.
# Fix: create a Role granting configmap read access and bind it to config-reader-sa.
