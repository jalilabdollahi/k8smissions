# BROKEN: The Perfect Storm - EVERYTHING is broken!
# Multiple simultaneous failures across all Module 5 concepts

apiVersion: v1
kind: Namespace
metadata:
  name: k8smissions
  labels:
    pod-security.kubernetes.io/enforce: restricted

---
# ResourceQuota - very restrictive
apiVersion: v1
kind: ResourceQuota
metadata:
  name: chaos-quota
  namespace: k8smissions
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "1Gi"
    pods: "5"

---
# ServiceAccount exists but NO RBAC!
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: k8smissions

---
# NetworkPolicy - DENY ALL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: k8smissions
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]

---
# Deployment with EVERY problem
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-app
  namespace: k8smissions
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chaos
  template:
    metadata:
      labels:
        app: chaos
    spec:
      serviceAccountName: app-sa
      containers:
      - name: app
        image: nginx:latest
        resources:
          requests:
            cpu: "1"
            memory: "512Mi"
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: true

---
# PDB impossible to satisfy
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chaos-pdb
  namespace: k8smissions
spec:
  minAvailable: 5
  selector:
    matchLabels:
      app: chaos

