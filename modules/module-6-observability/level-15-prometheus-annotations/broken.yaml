apiVersion: v1
kind: Pod
metadata:
  name: metrics-app
  namespace: k8smissions
  labels:
    app: metrics-app
  # ❌ BUG: No Prometheus scrape annotations present.
  # Prometheus uses pod annotations to discover scrape targets.
  # Without prometheus.io/scrape: "true", this pod is invisible to Prometheus
  # and its metrics will never appear in dashboards.
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - while true; do echo 'http_requests_total 42'; sleep 30; done
    ports:
    - name: metrics
      containerPort: 9090
