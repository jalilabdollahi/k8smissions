apiVersion: v1
kind: Pod
metadata:
  name: logger-app
  namespace: k8smissions
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - while true; do echo "[$LOG_LEVEL] log line"; sleep 0.1; done
    env:
    - name: LOG_LEVEL
      value: DEBUG  # ❌ BUG: LOG_LEVEL is set to DEBUG, producing ~10 log lines per second.
                    # This floods the logging pipeline, consuming excessive storage and
                    # making it impossible to find meaningful log entries.
