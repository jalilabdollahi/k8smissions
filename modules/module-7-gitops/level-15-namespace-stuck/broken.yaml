apiVersion: v1
kind: Namespace
metadata:
  name: zombie-ns
  finalizers:
  - kubernetes          # ❌ BUG: namespace finalizer 'kubernetes' blocks deletion until all objects inside are gone
status:
  phase: Terminating    # ❌ BUG: namespace is stuck Terminating — waiting for object finalizers to clear
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stuck-resource
  namespace: zombie-ns
  finalizers:
  - some.controller.io/cleanup  # ❌ BUG: operator finalizer registered but operator is deleted — never cleared; blocks namespace deletion
data:
  key: value
