# ✅ FIX: Keep the deny-all policy (good security!) but add targeted allow rules.
# NetworkPolicy rules are additive — multiple policies combine with OR logic.
# The allow rule permits frontend→backend ingress without removing the default deny.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: k8smissions
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# ✅ FIX: Add targeted allow rule for frontend→backend traffic.
# This restores service communication while keeping the deny-all baseline.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend  # ✅ FIX: New allow rule — backend accepts ingress from frontend only
  namespace: k8smissions
spec:
  podSelector:
    matchLabels:
      app: backend   # ✅ FIX: This policy applies to backend pods
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend  # ✅ FIX: Only frontend pods are allowed to reach backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8smissions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k8smissions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
