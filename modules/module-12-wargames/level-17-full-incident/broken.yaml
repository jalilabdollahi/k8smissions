# ❌ BUG: P0 Incident — 5 simultaneous failures. Fix in dependency order:
# 1. Secret p0-secret is missing (pod cannot start without it)
# 2. ServiceAccount p0-sa is missing (pod spec references it)
# 3. Deployment has replicas:0 AND nodeSelector pointing to non-existent label
# 4. NetworkPolicy blocks DNS egress (UDP/TCP port 53 not allowed)
# 5. PVC requests 999Ti storage — no storage class can provision this
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: p0-app
  namespace: k8smissions
spec:
  replicas: 0  # ❌ BUG: Deployment scaled to zero — no running pods
  selector:
    matchLabels:
      app: p0-app
  template:
    metadata:
      labels:
        app: p0-app
    spec:
      serviceAccountName: p0-sa  # ❌ BUG: ServiceAccount p0-sa does not exist in cluster
      nodeSelector:
        environment: prod-zone-nonexistent  # ❌ BUG: No node has this label — pods would be Unschedulable
      containers:
      - name: p0-app
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
        env:
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: p0-secret  # ❌ BUG: Secret p0-secret does not exist — CreateContainerConfigError
              key: password
---
# ❌ BUG: NetworkPolicy only allows TCP:80 egress — DNS (UDP/TCP port 53) is blocked.
# Pods cannot resolve any service names — all DNS lookups fail.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-dns
  namespace: k8smissions
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 80
      protocol: TCP  # ❌ BUG: Only TCP:80 allowed — DNS port 53 UDP+TCP is blocked
---
# ❌ BUG: PVC requests 999Ti storage — impossible to provision on any standard storage class.
# PVC will remain Pending forever, blocking any pod that mounts it.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: p0-pvc
  namespace: k8smissions
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 999Ti  # ❌ BUG: Impossibly large storage request — PVC stuck in Pending
  storageClassName: standard
