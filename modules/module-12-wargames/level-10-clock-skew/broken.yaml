# NTP sync is not running (ntp_sync: false). JWT tokens include iat/exp timestamps.
# A 10-minute clock skew makes tokens appear expired before they are, causing
# all authentication requests to fail with "token expired" errors cluster-wide.
# Kubernetes itself tolerates up to 5 minutes of skew — 10 minutes exceeds that limit.
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-clock-status
  namespace: k8smissions
data:
  node: kind-worker
  ntp_sync: 'false'
  skew_seconds: '600'
  status: critical
