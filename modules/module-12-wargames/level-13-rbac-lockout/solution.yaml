# ✅ FIX: Recreate the missing RoleBinding to reconnect app-sa to app-role.
# The RBAC triple is now complete: ServiceAccount + Role + RoleBinding.
# app-sa will immediately be able to get/list/watch pods and configmaps.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: k8smissions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-role
  namespace: k8smissions
rules:
- apiGroups: [""]
  resources: ["pods", "configmaps"]
  verbs: ["get", "list", "watch"]
---
# ✅ FIX: Recreate the RoleBinding that was deleted during service account rotation.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rb  # ✅ FIX: RoleBinding restored — RBAC triple is complete again
  namespace: k8smissions
subjects:
- kind: ServiceAccount
  name: app-sa         # ✅ FIX: Binds the correct ServiceAccount
  namespace: k8smissions
roleRef:
  kind: Role
  name: app-role       # ✅ FIX: References the correct Role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app
  namespace: k8smissions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-app
  template:
    metadata:
      labels:
        app: api-app
    spec:
      serviceAccountName: app-sa
      containers:
      - name: api-app
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
