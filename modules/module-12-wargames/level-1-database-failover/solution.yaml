---
# ✅ FIX: Restore the db-primary Pod so db-service has a healthy endpoint.
apiVersion: v1
kind: Pod
metadata:
  name: db-primary   # ✅ FIX: Recreate the deleted db-primary pod
  namespace: k8smissions
  labels:
    app: db           # ✅ FIX: Label must match db-service selector
spec:
  containers:
  - name: db
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - sleep 3600
    ports:
    - containerPort: 5432
---
# ✅ FIX: Restore the db-service so app pods can resolve the database via DNS.
apiVersion: v1
kind: Service
metadata:
  name: db-service   # ✅ FIX: Recreate the deleted Service (app DNS resolution depends on this name)
  namespace: k8smissions
spec:
  selector:
    app: db
  ports:
  - port: 5432
    targetPort: 5432
---
# ✅ FIX: app-server Deployment unchanged — once db-service has endpoints
# the readinessProbe passes and pods become Ready automatically.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-server
  namespace: k8smissions
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-server
  template:
    metadata:
      labels:
        app: app-server
    spec:
      containers:
      - name: app-server
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - until nc -z db-service 5432; do echo waiting; sleep 2; done; sleep 3600
        readinessProbe:
          exec:
            command:
            - nc
            - -z
            - db-service
            - '5432'
          initialDelaySeconds: 3
          periodSeconds: 5
