---
apiVersion: v1
kind: Namespace
metadata:
  name: k8smissions
---
apiVersion: v1
kind: Pod
metadata:
  name: web-app
  namespace: k8smissions
  labels:
    app: web
spec:
  containers:
  - name: nginx
    image: nginx:1.21
    ports:
    - containerPort: 80
---
# In local clusters (kind, minikube, k3d), this stays in Pending state forever
# LoadBalancer services need external load balancer provisioning from cloud providers
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: k8smissions
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
