apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8smissions
spec:
  paused: true
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:1.25
