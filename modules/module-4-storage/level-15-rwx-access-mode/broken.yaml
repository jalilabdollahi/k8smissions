apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-pvc
  namespace: k8smissions
spec:
  accessModes:
  - ReadWriteOnce  # ❌ BUG: RWO only allows one node to mount — multiple pod replicas on different nodes will fail
  storageClassName: standard
  resources:
    requests:
      storage: 2Gi
