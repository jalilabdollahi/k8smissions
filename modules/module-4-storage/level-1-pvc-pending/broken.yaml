---
apiVersion: v1
kind: Namespace
metadata:
  name: k8smissions
---
# Also, PVC requests storage class "fast" but PV has "standard"
apiVersion: v1
kind: PersistentVolume
metadata:
  name: app-storage
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /tmp/k8smissions-data
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-storage-claim
  namespace: k8smissions
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: database-pod
  namespace: k8smissions
spec:
  containers:
  - name: db
    image: busybox:1.28
    command: ['sh', '-c', 'echo "Database running" && sleep 3600']
    volumeMounts:
    - name: storage
      mountPath: /data
  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: app-storage-claim  # References pending PVC
