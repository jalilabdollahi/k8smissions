apiVersion: v1
kind: Pod
metadata:
  name: ml-pod
  namespace: k8smissions
spec:
  # ❌ BUG: No schedulerName specified — the pod defaults to 'default-scheduler'.
  # The ML-aware custom scheduler ('ml-scheduler') never processes this pod,
  # so GPU-topology and ML-specific placement logic is bypassed.
  containers:
  - name: trainer
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - sleep 3600
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
