apiVersion: v1
kind: Pod
metadata:
  name: fpga-pod
  namespace: k8smissions
spec:
  containers:
  - name: compute
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - sleep 3600
    resources:
      limits:
        # plugin registered 'company.io/fpga'. Names must match exactly.
        # No node reports 'my.company/fpga' capacity → pod stuck Pending.
        my.company/fpga: '1'
