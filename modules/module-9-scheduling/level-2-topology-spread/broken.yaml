apiVersion: apps/v1
kind: Deployment
metadata:
  name: ha-app
  namespace: k8smissions
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ha-app
  template:
    metadata:
      labels:
        app: ha-app
    spec:
      # ❌ BUG: No topologySpreadConstraints defined — the scheduler can place
      # all 4 pods on the same node, creating a single point of failure.
      containers:
      - name: app
        image: nginx:1.25
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
