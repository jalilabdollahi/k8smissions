apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-job
  namespace: k8smissions
spec:
  replicas: 3
  selector:
    matchLabels:
      app: batch
  template:
    metadata:
      labels:
        app: batch
    spec:
      tolerations:
      - key: spot
        operator: Equal
        value: 'true'
        effect: NoSchedule
      # ❌ BUG: nodeSelector pins pods exclusively to spot nodes. When spot nodes
      # are reclaimed by the cloud provider, pods cannot reschedule to on-demand
      # nodes because (1) nodeSelector blocks it and (2) on-demand taint is not tolerated.
      nodeSelector:
        node-type: spot
      containers:
      - name: batch
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - sleep 3600
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
