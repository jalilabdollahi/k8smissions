apiVersion: v1
kind: Pod
metadata:
  name: mem-pod
  namespace: k8smissions
spec:
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - sleep 3600
    resources:
      requests:
        cpu: 100m
        # but exceeds the allocatable memory (capacity minus kubelet/system reserves).
        # The scheduler sees Insufficient memory even though the node looks available.
        memory: 5Gi
      limits:
        cpu: 200m
        memory: 6Gi
