apiVersion: v1
kind: List
items:
- apiVersion: v1
  kind: Pod
  metadata:
    name: team-a-pod
    namespace: k8smissions
  spec:
    # ❌ BUG (team-a): nodeSelector 'team: team-a' does not match any node label.
    # Pod stuck Pending — no nodes available matching nodeSelector.
    nodeSelector:
      team: team-a
    containers:
    - name: app
      image: nginx:1.25
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: team-b-deploy
    namespace: k8smissions
  spec:
    replicas: 5
    selector:
      matchLabels:
        app: team-b
    template:
      metadata:
        labels:
          app: team-b
      spec:
        affinity:
          podAntiAffinity:
            # ❌ BUG (team-b): requiredDuringScheduling anti-affinity with hostname
            # topology and 5 replicas — 5 pods need 5 unique nodes but only 2 exist.
            # At least 3 pods will be permanently Pending.
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: team-b
              topologyKey: kubernetes.io/hostname
        containers:
        - name: app
          image: nginx:1.25
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
- apiVersion: v1
  kind: Pod
  metadata:
    name: team-c-pod
    namespace: k8smissions
  spec:
    # ❌ BUG (team-c): 'non-existent-priority' PriorityClass does not exist.
    # The API server rejects the pod — it cannot even enter the scheduling queue.
    priorityClassName: non-existent-priority
    containers:
    - name: app
      image: nginx:1.25
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
