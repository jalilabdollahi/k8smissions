apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: my-app-vpa
  namespace: k8smissions
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-app
  updatePolicy:
    # ✅ FIX: Changed updateMode from 'Off' to 'Auto'. VPA will now evict and
    # restart pods with adjusted resource requests based on actual usage data.
    updateMode: Auto
