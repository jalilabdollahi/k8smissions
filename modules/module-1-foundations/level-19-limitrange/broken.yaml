apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: k8smissions
spec:
  limits:
  - type: Container
    max:
      cpu: '1'
      memory: 512Mi
    default:
      cpu: 100m
      memory: 32Mi
    defaultRequest:
      cpu: 50m
      memory: 16Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: noisy-pod
  namespace: k8smissions
spec:
  containers:
  - name: noisy
    image: python:3.11-alpine
    command:
    - python
    - -c
    - "data = bytearray(64 * 1024 * 1024); import time; time.sleep(3600)"
