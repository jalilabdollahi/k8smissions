apiVersion: v1
kind: Pod
metadata:
  name: noisy-pod
  namespace: k8smissions
spec:
  containers:
  - name: noisy
    image: python:3.11-alpine
    command:
    - python
    - -c
    - "data = bytearray(64 * 1024 * 1024); import time; time.sleep(3600)"
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi
