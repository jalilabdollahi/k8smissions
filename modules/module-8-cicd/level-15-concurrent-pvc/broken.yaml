apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: ci-pipeline
  namespace: k8smissions
spec:
  workspaces:
  - name: source
  tasks:
  - name: build
    taskRef:
      name: build-task
    workspaces:
    - name: source
      workspace: source
---
# PipelineRun — multiple concurrent instances reference the SAME shared PVC
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: ci-run-001
  namespace: k8smissions
spec:
  pipelineRef:
    name: ci-pipeline
  workspaces:
  - name: source
    persistentVolumeClaim:
      claimName: shared-build-pvc
