apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: injected-task
  namespace: k8smissions
spec:
  podTemplate:
    labels:
      sidecar.istio.io/inject: "false"  # ✅ FIX: label on the pod (via podTemplate) opts out of Istio sidecar injection
